name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test-and-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: reference-impl/package-lock.json

      - name: Install dependencies
        working-directory: reference-impl
        run: npm ci

      - name: Run tests
        working-directory: reference-impl
        run: npm test

      - name: Run validation
        working-directory: reference-impl
        run: npm run validate
